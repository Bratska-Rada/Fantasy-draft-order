<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Братська Рада — NASCAR Driver Reveal</title>
<style>
:root {
--bg:#060b20; --panel:#101735; --panel2:#151e43; --text:#f7f9ff;
--muted:#91a3cc; --accent:#49e7b2; --accent2:#6fa8ff; --danger:#ff5c88;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 50% -10%,#172551 0,#060b20 45%);
color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}
.wrap{max-width:900px;margin:auto;padding:22px 16px 50px}
header{text-align:center;margin:12px 0 22px}
h1{font-size:clamp(28px,6vw,52px);margin:0;letter-spacing:-.03em}
.subtitle{color:var(--muted);margin-top:8px}
.card{background:rgba(16,23,53,.9);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:18px;
box-shadow:0 20px 60px rgba(0,0,0,.32);margin-bottom:16px}
label{display:block;color:var(--muted);font-size:13px;font-weight:700;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.08em}
input,select,button{font:inherit}
input,select{width:100%;background:#09102a;color:var(--text);border:1px solid rgba(255,255,255,.13);border-radius:13px;padding:13px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
button{border:0;border-radius:14px;padding:13px 16px;font-weight:850;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--accent),#34bff5);color:#04111d}
.secondary{background:#273158;color:white}
.danger{background:#4a1830;color:#ffd8e6}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.hidden{display:none!important}
.countdown{font-size:clamp(52px,14vw,110px);font-weight:950;text-align:center;letter-spacing:-.06em;margin:20px 0}
.status{text-align:center;color:var(--muted);font-size:18px}
.reveal{text-align:center;padding:28px 12px}
.team-name{font-size:clamp(28px,7vw,58px);font-weight:950;line-height:1.02}
.arrow{font-size:42px;color:var(--accent);margin:14px}
.driver-card{background:linear-gradient(145deg,#172451,#0d1536);border:1px solid rgba(255,255,255,.11);
border-radius:24px;padding:24px;animation:pop .55s cubic-bezier(.2,.8,.2,1)}
.car{font-size:clamp(52px,13vw,96px);font-weight:1000;color:var(--accent)}
.driver{font-size:clamp(28px,7vw,52px);font-weight:950}
.meta{color:var(--muted);font-size:18px;margin-top:8px}
.progress{height:10px;background:#09102a;border-radius:99px;overflow:hidden;margin:18px 0}
.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .4s}
.results{display:grid;gap:10px}
.result{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;background:#0a112d;border-radius:15px;padding:12px}
.num{width:36px;height:36px;border-radius:11px;background:#202b55;display:grid;place-items:center;font-weight:900}
.small{font-size:13px;color:var(--muted)}
.result strong{display:block}
.sharebox{word-break:break-all;background:#080f29;border-radius:12px;padding:11px;color:#b9c8ec;font-size:13px;margin-top:10px}
.note{font-size:13px;color:var(--muted);line-height:1.45}
@keyframes pop{0%{transform:scale(.86);opacity:0}100%{transform:scale(1);opacity:1}}
@media(max-width:600px){.row{grid-template-columns:1fr} .result{grid-template-columns:38px 1fr} .result .right{grid-column:2}}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>🏁 Братська Рада</h1>
<div class="subtitle">2026 NASCAR Driver Reveal</div>
</header>
<section id="loading" class="card">
<h2 style="margin-top:0;text-align:center">Loading reveal…</h2>
<p class="status">Please wait while the draw is loaded.</p>
</section>
<section id="error" class="card hidden">
<h2 style="margin-top:0;text-align:center">Reveal not found</h2>
<p class="status" id="errorMessage">Check the link and try again.</p>
</section>
<section id="show" class="card hidden">
<div id="waiting">
<div class="status">Driver assignments begin in</div>
<div class="countdown" id="countdown">--:--</div>
<div class="status" id="scheduled"></div>
</div>
<div id="reveal" class="reveal hidden">
<div class="status" id="revealCounter"></div>
<div class="progress"><div id="bar"></div></div>
<div class="team-name" id="teamName"></div>
<div class="arrow">↓</div>
<div class="driver-card" id="driverCard">
<div class="car" id="carNo"></div>
<div class="driver" id="driverName"></div>
<div class="meta" id="driverMeta"></div>
</div>
</div>
<div id="finished" class="hidden">
<h2 style="text-align:center">Final assignments</h2>
<div class="results" id="results"></div>
<div class="actions" style="justify-content:center"><button class="secondary" id="copyResults">Copy results</button></div>
</div>
</section>
</div>
<script>
function params() { return new URLSearchParams(location.search); }

function showError(message) {
document.getElementById('loading').classList.add('hidden');
document.getElementById('show').classList.add('hidden');
document.getElementById('errorMessage').textContent=message;
document.getElementById('error').classList.remove('hidden');
}

function runReveal(start, intervalSec, list) {
document.getElementById('loading').classList.add('hidden');
document.getElementById('show').classList.remove('hidden');
const waiting=document.getElementById('waiting');
const reveal=document.getElementById('reveal');
const finished=document.getElementById('finished');
document.getElementById('scheduled').textContent=new Date(start).toLocaleString([],{dateStyle:'full',timeStyle:'short'});
let timer;

function showFinal() {
waiting.classList.add('hidden');
reveal.classList.add('hidden');
finished.classList.remove('hidden');
document.getElementById('results').innerHTML=list.map((a,i)=>`
<div class="result">
<div class="num">${i+1}</div>
<div><strong>${a.team}</strong><span class="small">Assigned driver</span></div>
<div class="right"><strong>#${a.driver.car} ${a.driver.name}</strong><span class="small">${a.driver.make}</span></div>
</div>`).join('');
const text=list.map((a,i)=>`${i+1}. ${a.team} — #${a.driver.car} ${a.driver.name}`).join('\n');
const btn=document.getElementById('copyResults');
btn.onclick=async()=>{
try {
await navigator.clipboard.writeText(text);
btn.textContent='Copied!';
} catch {
btn.textContent='Copy failed';
}
};
}

function show(i) {
const a=list[i];
if(!a) return showFinal();
document.getElementById('revealCounter').textContent=`Assignment ${i+1} of ${list.length}`;
document.getElementById('bar').style.width=`${((i+1)/list.length)*100}%`;
document.getElementById('teamName').textContent=a.team;
document.getElementById('carNo').textContent='#'+a.driver.car;
document.getElementById('driverName').textContent=a.driver.name;
document.getElementById('driverMeta').textContent=a.driver.team+' • '+a.driver.make;
const card=document.getElementById('driverCard');
card.style.animation='none';
void card.offsetWidth;
card.style.animation='';
}

function startSequence() {
waiting.classList.add('hidden');
const elapsed=Math.max(0,Date.now()-start);
const revealDuration=list.length*intervalSec*1000;
if(elapsed>=revealDuration) return showFinal();

reveal.classList.remove('hidden');
let index=Math.min(list.length-1,Math.floor(elapsed/(intervalSec*1000)));
show(index);
const nextRevealAt=start+(index+1)*intervalSec*1000;
let delay=Math.max(0,nextRevealAt-Date.now());

function advance() {
index++;
if(index>=list.length) return showFinal();
show(index);
setTimeout(advance,intervalSec*1000);
}
setTimeout(advance,delay);
}

function tick() {
const diff=start-Date.now();
if(diff<=0) {
clearInterval(timer);
startSequence();
return;
}
const total=Math.ceil(diff/1000);
const days=Math.floor(total/86400);
const h=Math.floor((total%86400)/3600);
const m=Math.floor((total%3600)/60);
const s=total%60;
document.getElementById('countdown').textContent=
(days?days+'d ':'')+
String(h).padStart(2,'0')+':'+
String(m).padStart(2,'0')+':'+
String(s).padStart(2,'0');
}

tick();
timer=setInterval(tick,250);
}

async function loadDraw() {
const drawId=(params().get('draw')||'').trim();
if(!/^[a-zA-Z0-9_-]+$/.test(drawId)) {
showError('This reveal link is missing a valid draw ID.');
return;
}
try {
const response=await fetch(`draws/${encodeURIComponent(drawId)}.json`,{cache:'no-store'});
if(!response.ok) throw new Error('not found');
const data=await response.json();
if(!Number.isFinite(data.start)||!Number.isFinite(data.interval)||!Array.isArray(data.assignments)) {
throw new Error('invalid');
}
runReveal(data.start,Math.max(3,data.interval),data.assignments);
} catch {
showError('This reveal could not be loaded. Check the draw ID or try again shortly.');
}
}

loadDraw();
</script>
</body>
</html>
